services:
  - type: web
    name: smartgrad-api
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/utils/train_models.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
